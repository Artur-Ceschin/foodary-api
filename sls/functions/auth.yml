signUp:
  handler: src/main/functions/auth/signUp.handler
  events:
    - httpApi:
        path: /auth/sign-up
        method: POST

signIn:
  handler: src/main/functions/auth/signIn.handler
  events:
    - httpApi:
        path: /auth/sign-in
        method: POST

preSignUpTrigger:
  handler: src/main/functions/auth/preSignUpTrigger.handler
  events:
    - cognitoUserPool:
        pool: ${self:custom.cognito.PoolName}
        trigger: PreSignUp
        existing: true
        forceDeploy: true

# The trigger is configured manually to support event v3
# Go to UserPool.yml to see the configuration
# Do not change this function name without changing it in UserPool.yml
preTokenGenerationTrigger:
  handler: src/main/functions/auth/preTokenGenerationTrigger.handler
